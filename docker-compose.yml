# Telnyx IVR — run it:
#   docker compose up -d --build                 # app only (expose with your own tunnel/ngrok)
#   docker compose --profile tunnel up -d --build # app + Cloudflare Tunnel (TUNNEL_TOKEN in .env)
#   docker compose logs -f ivr                   # watch call logs
#
# PODMAN + SELinux (e.g. RHEL/Fedora) users — two things matter:
#   1. Bind mounts need an SELinux relabel or the container gets "Permission denied"
#      on data/. The `:z` suffix on the volume lines below does that (harmless no-op
#      on plain Docker).
#   2. Writing to ./recordings (voicemails, leads.csv, transcripts) needs the
#      container's uid to map to the host user that owns the folder — hence
#      `userns_mode: keep-id` below. Without it, rootless podman maps uid 1000 to a
#      subuid and every write fails with EACCES. (`keep-id` is podman-only; on plain
#      Docker, drop that line and instead `chown -R 1000 recordings` on the host.)
#
# VOLUMES — host folders mounted in so you change them WITHOUT rebuilding the image:
#   ./app + ./main.py  application code   (edit + restart -> applies, no rebuild)
#   ./texml            IVR / voicemail XML + dashboard templates (auto-reloaded)
#   ./data             companies/routing/options/contacts/hours CSVs
#   ./audio            pre-recorded prompt clips, served at /audio
#   ./recordings       saved audio + transcripts + index.csv + leads.csv + call log (rw)

services:
  ivr:
    build:
      context: .
      # Bake in local faster-whisper transcription (TRANSCRIBE_ENABLED). Needed for
      # the free, on-box transcripts; makes the image ~620MB instead of ~200MB.
      args:
        INSTALL_TRANSCRIBE: "true"
    env_file: .env
    # Map the container's uid to the host user so writes to ./recordings succeed
    # under rootless podman. Remove this line on plain Docker (see note above).
    userns_mode: keep-id
    ports:
      # host 9395 -> container 8000. 8000 is left free for other local dev. NOTE:
      # this is the HOST mapping only; inside the compose network the app is reached
      # as `ivr:8000` (the container port) — see the tunnel note below.
      - "9395:8000"
    volumes:
      - ./main.py:/app/main.py:ro,z    # app entrypoint (router includes live here)
      - ./app:/app/app:ro,z            # application code (edit + restart, no rebuild)
      - ./texml:/app/texml:ro,z        # templates (IVR XML + dashboard HTML)
      - ./data:/app/data:ro,z          # CSV data
      - ./audio:/app/audio:ro,z        # pre-recorded prompt clips
      - ./recordings:/app/recordings:z # recordings/leads/log (rw — must be writable)
    restart: unless-stopped
    healthcheck:
      # Marks the container unhealthy if /health isn't 200 (it returns 503 when the
      # app can't serve calls), so `restart: unless-stopped` brings it back.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # Optional: publish the app via Cloudflare Tunnel instead of opening a port.
  # In the Cloudflare Zero Trust dashboard, set the tunnel's Public Hostname service
  # to  http://ivr:8000  (the CONTAINER port over the compose network — NOT 9395,
  # which is only the host mapping). Put the tunnel token in .env as TUNNEL_TOKEN.
  #   docker compose --profile tunnel up -d
  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - ivr
    restart: unless-stopped
    profiles:
      - tunnel

# ── Named-volume alternative for recordings ──────────────────────────────────
# Docker-managed storage (no host-permission headaches). To use it instead of the
# bind mount above: swap `./recordings:/app/recordings` for `recordings:/app/recordings`,
# then uncomment this block. Inspect files with: docker compose exec ivr ls recordings
# volumes:
#   recordings:
